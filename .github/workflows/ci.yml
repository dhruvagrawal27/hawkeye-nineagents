name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install ".[dev]"
      - name: ruff check
        working-directory: backend
        run: ruff check app/
      - name: mypy
        working-directory: backend
        run: mypy app/ || true   # informational; tighten once stable

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install ".[dev]"
      - name: pytest (unit)
        working-directory: backend
        run: pytest tests/ -q

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci || npm install
      - name: tsc + lint
        working-directory: frontend
        run: |
          npx tsc --noEmit
          npm run lint --if-present
