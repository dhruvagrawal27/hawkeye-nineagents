# HAWKEYE — host nginx config (Hetzner VPS)
# Copies to /etc/nginx/sites-available/hawkeye.nineagents.in by deploy/deploy.sh
# certbot --nginx will inject the TLS certificate paths.

upstream hawkeye_fe  { server 127.0.0.1:8080; }
upstream hawkeye_api { server 127.0.0.1:8000; }
upstream hawkeye_kc  { server 127.0.0.1:8081; }

# HTTP — ACME challenge + permanent redirect to HTTPS
server {
    listen 80;
    server_name hawkeye.nineagents.in;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name hawkeye.nineagents.in;

    # Managed by certbot — these paths exist after `certbot --nginx -d hawkeye.nineagents.in`.
    ssl_certificate     /etc/letsencrypt/live/hawkeye.nineagents.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hawkeye.nineagents.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # CSP: allow self + Keycloak; relax in dev
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' data: fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss:; frame-ancestors 'none'" always;

    client_max_body_size 25m;
    proxy_read_timeout   60s;
    proxy_send_timeout   60s;

    # API
    location /api/ {
        proxy_pass http://hawkeye_api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # WebSocket (alerts)
    location /ws/ {
        proxy_pass http://hawkeye_api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400s;
    }

    # Keycloak (OIDC)
    location /auth/ {
        proxy_pass http://hawkeye_kc/auth/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffer_size 8k;
    }

    # Frontend SPA (catch-all last)
    location / {
        proxy_pass http://hawkeye_fe/;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
