# Prod overrides — `restart: unless-stopped` on every service.
#
# Port-binding is controlled by the BIND_HOST env var read by the BASE
# docker-compose.yml. Set BIND_HOST=127.0.0.1 in the .env file to bind
# all admin ports (postgres, redis, neo4j, kafka, minio, keycloak,
# mlflow, prometheus, grafana, backend, frontend) to loopback only —
# host nginx is the only thing that should reach them externally.
#
# Local dev leaves BIND_HOST unset → defaults to 0.0.0.0 (all interfaces).

services:
  zookeeper:    { restart: unless-stopped }
  kafka:        { restart: unless-stopped }
  kafka-init:   { restart: "no" }
  redis:        { restart: unless-stopped }
  neo4j:        { restart: unless-stopped }
  postgres:     { restart: unless-stopped }
  minio:        { restart: unless-stopped }
  keycloak:     { restart: unless-stopped }
  mlflow:       { restart: unless-stopped }
  prometheus:   { restart: unless-stopped }
  grafana:      { restart: unless-stopped }
  backend:      { restart: unless-stopped }
  frontend:     { restart: unless-stopped }
